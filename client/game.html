<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Color Game</title>

  <link rel="stylesheet" href="./app.css" />
  <link rel="stylesheet" href="./game/game.css" />

  <script type="module" src="./game/gamePage.mjs"></script>
</head>

<body>
  <main>
    <p id="currentUser"></p>
    <p id="turnInfo"></p>
    <p id="players"></p>

    <h1 style="text-align: center;">Memory Fargespill</h1>

    <div class="board-wrap">
      <div id="sequenceOverlay" class="sequence-overlay hidden">
        <button id="showSequenceBtn" type="button">Vis sekvens</button>
      </div>

      <section class="game-board">
        <button class="color-btn blue" data-color="blue" aria-label="Blue"></button>
        <button class="color-btn red" data-color="red" aria-label="Red"></button>
        <button class="color-btn green" data-color="green" aria-label="Green"></button>
        <button class="color-btn yellow" data-color="yellow" aria-label="Yellow"></button>
      </section>
    </div>

    <p class="status" id="status">Waiting for game...</p>
  </main>
</body>
</html>
